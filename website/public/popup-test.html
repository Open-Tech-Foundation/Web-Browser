<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Permission Test</title></head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;font-family:system-ui,sans-serif;gap:1rem">
  <button onclick="window.open('about:blank')" style="padding:1rem 2rem;font-size:1.25rem;cursor:pointer;border:none;border-radius:8px;background:#6366f1;color:#fff;font-weight:600;width:260px">
    Open Popup
  </button>
  <pre id="out" style="background:#f1f5f9;padding:1rem;border-radius:8px;min-width:300px;min-height:60px;font-size:0.9rem">requesting location...</pre>
  <script>
    navigator.geolocation.getCurrentPosition(
      p => document.getElementById('out').textContent = JSON.stringify({latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy}, null, 2),
      e => document.getElementById('out').textContent = JSON.stringify({error:e.code,message:e.message}, null, 2)
    );
  </script>
</body>
</html>

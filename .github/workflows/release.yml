name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Limit the GITHUB_TOKEN to the minimum needed by this workflow. Any future
# step that tries to do more (push to other refs, comment on PRs, etc.) will
# fail noisily instead of silently exfiltrating via the default scopes.
permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-24.04

    steps:
      # Third-party actions are pinned to commit SHAs (with the human-readable
      # tag in a comment) so a compromised upstream repo can't quietly swap
      # malicious code into the release build. Dependabot can keep these
      # current via `package-ecosystem: github-actions`.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          # Pinned to match the local Bun that generates bun.lock. The
          # newer text-lockfile format (lockfileVersion + configVersion
          # fields) is unreadable by Bun < ~1.3, so any older pin here
          # fails with 'Unknown lockfile version'.
          bun-version: "1.3.12"

      # `bun x vite build` only fetches vite itself, not the plugins the
      # ui/vite.config.js file imports (@vitejs/plugin-react,
      # @tailwindcss/vite, react, etc.). Without this step the build fails
      # with ERR_MODULE_NOT_FOUND on those imports.
      # --frozen-lockfile guards against accidental bun.lock drift in CI.
      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Ubuntu 24.04 went through the time_t64 ABI transition: several
          # libraries got renamed with a "t64" suffix and the old names became
          # virtual packages with no installation candidate. Ask for the t64
          # names directly so apt resolves them on 24.04 (and on older Ubuntu
          # releases the t64 packages still exist as aliases).
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++-14 \
            pkg-config \
            libvips-dev \
            libsqlite3-dev \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm-dev \
            libgbm-dev \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            libgtk-3-dev \
            libfuse2t64
          # Download AppImageKit appimagetool to package the AppDir
          # We use this instead of linuxdeploy to avoid bundling host graphics libraries.
          curl -fLo /tmp/appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool-x86_64.AppImage

          # Download the official standard AppRun binary
          curl -fLo /tmp/AppRun-x86_64 \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-x86_64"
          chmod +x /tmp/AppRun-x86_64

      - name: Set CC/CXX to GCC 14
        run: |
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      # CEF is a ~400 MB download from Spotify's CDN. Cache it keyed on the
      # version file so subsequent runs at the same CEF_VERSION skip the
      # download (and the CDN dependency at release time). The cache key
      # bumps automatically whenever CEF_VERSION changes.
      - name: Cache CEF SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: third_party/cef
          key: cef-linux64-${{ hashFiles('CEF_VERSION', 'CEF_SHA256') }}

      - name: Install Dependencies (CEF)
        run: bun run setup

      - name: Build UI Assets
        run: bun run build:ui

      - name: Build C++ Engine
        env:
          # The release tag minus its leading "v" is baked into the binary
          # so `otf-browser --version` reports the published version (e.g.
          # "0.1.0-alpha.1") rather than the bare CMakeLists base version.
          OTF_VERSION: ${{ github.ref_name != '' && (startsWith(github.ref_name, 'v') && github.ref_name || '') || '' }}
        run: |
          # Strip the leading "v" if present (no-op for workflow_dispatch on
          # a branch, which keeps the project's base version).
          if [ -n "${OTF_VERSION}" ]; then
            export OTF_VERSION="${OTF_VERSION#v}"
            echo "Embedding OTF_VERSION=${OTF_VERSION}"
          fi
          bun run build:cpp

      - name: Run Tests
        run: bun run test

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF_NAME}
          PACKAGE_NAME="otf-browser-linux-x64-${VERSION}"
          mkdir -p ${PACKAGE_NAME}
          cp -r build/Release/* ${PACKAGE_NAME}/
          # Remove test binaries from release package
          rm -f ${PACKAGE_NAME}/otf-browser-native-tests
          rm -f ${PACKAGE_NAME}/otf-browser-extra-tests
          # Strip the main binary (debug info isn't useful in a release
          # tarball and meaningfully shrinks the download).
          strip ${PACKAGE_NAME}/otf-browser || true
          # Bundle the project license and CEF's third-party license so the
          # tarball is self-contained for compliance / audit.
          cp LICENSE ${PACKAGE_NAME}/LICENSE
          cp third_party/cef/LICENSE.txt ${PACKAGE_NAME}/LICENSE-cef.txt
          # Tell the recipient how to make chrome-sandbox usable. The build's
          # SUID-helper note doesn't survive into the tarball, and without
          # this step the binary refuses to launch with a sandbox error.
          cat > ${PACKAGE_NAME}/INSTALL.txt <<'EOF'
          OTF Browser — installation notes
          ================================

          After extracting this tarball, give chrome-sandbox the SUID bit so
          the browser's sandbox can initialize:

              sudo chown root:root chrome-sandbox
              sudo chmod 4755 chrome-sandbox

          Then launch with:

              ./otf-browser

          If you skip the chmod step you can still run the browser with
          --no-sandbox, but doing so disables an important security layer
          and is not recommended for daily use.
          EOF
          # Smoke check: refuse to publish a tarball whose binary can't find
          # its shared libs. ldd output containing "not found" means the
          # rpath/copy step regressed and the binary won't launch at all.
          if ldd ${PACKAGE_NAME}/otf-browser | grep -q "not found"; then
            echo "Smoke check FAILED — missing shared libraries:" >&2
            ldd ${PACKAGE_NAME}/otf-browser | grep "not found" >&2
            exit 1
          fi
          tar -czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}
          # Publish a checksum alongside the tarball so downloaders can verify
          # the asset matches what this workflow built.
          sha256sum ${PACKAGE_NAME}.tar.gz > ${PACKAGE_NAME}.tar.gz.sha256
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "ASSET_PATH=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA256_PATH=${PACKAGE_NAME}.tar.gz.sha256" >> $GITHUB_ENV
          echo "ASSET_NAME=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Build AppImage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APPDIR="otf-browser.AppDir"
          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin" \
                   "${APPDIR}/usr/lib/otf-browser" \
                   "${APPDIR}/usr/share/applications"
          # Install icons at all sizes so the WM can pick the best fit for
          # each context (taskbar, alt-tab, app menu, etc.).
          for size in 16 32 48 64 128 256; do
            mkdir -p "${APPDIR}/usr/share/icons/hicolor/${size}x${size}/apps"
            cp "ui/assets/icons/otf-browser-${size}.png" \
              "${APPDIR}/usr/share/icons/hicolor/${size}x${size}/apps/otf-browser.png"
          done

          # Drop the entire built tree under usr/lib/otf-browser. CEF needs
          # libcef.so and the locales/, *.pak resources beside the binary, so
          # we keep them grouped and use AppRun to cd in.
          cp -r ${PACKAGE_NAME}/* "${APPDIR}/usr/lib/otf-browser/"

          # linuxdeploy expects the primary icon at AppDir root too.
          cp ui/assets/icons/otf-browser-256.png "${APPDIR}/otf-browser.png"

          # Desktop entry + AppRun launcher come from packaging/.
          cp packaging/otf-browser.desktop "${APPDIR}/otf-browser.desktop"
          cp packaging/otf-browser.desktop "${APPDIR}/usr/share/applications/"
          # Symlink the binary to usr/bin so the standard AppRun can execute it via the Exec= desktop entry
          ln -s ../lib/otf-browser/otf-browser "${APPDIR}/usr/bin/otf-browser"
          cp /tmp/AppRun-x86_64 "${APPDIR}/AppRun"

          export VERSION
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor.
          export APPIMAGE_EXTRACT_AND_RUN=1
          /tmp/appimagetool-x86_64.AppImage "${APPDIR}" "otf-browser-linux-x64-${GITHUB_REF_NAME}.AppImage"

          APPIMAGE_NAME="otf-browser-linux-x64-${GITHUB_REF_NAME}.AppImage"
          sha256sum "${APPIMAGE_NAME}" > "${APPIMAGE_NAME}.sha256"
          echo "APPIMAGE_PATH=${APPIMAGE_NAME}" >> $GITHUB_ENV
          echo "APPIMAGE_SHA256_PATH=${APPIMAGE_NAME}.sha256" >> $GITHUB_ENV

      - name: Build .deb and .rpm packages
        env:
          NFPM_VERSION: "2.46.3"
          # SHA256 of nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz from the
          # release's checksums.txt. Pinned so an upstream swap fails loudly.
          NFPM_SHA256: "9170d25ea056d7329def38134b2bcad98d02d221f8331610dcd619e84d28c565"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Download and verify nfpm.
          curl -fLo /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          echo "${NFPM_SHA256}  /tmp/nfpm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          chmod +x /tmp/nfpm

          # nfpm does NOT expand ${VAR} in contents[].src — it only does env
          # substitution on a small subset of fields. Pre-process the yaml
          # ourselves with sed so the staging path and version are inlined
          # before nfpm sees the file. Verified locally against nfpm v2.46.3:
          # the unsubstituted yaml fails with "lstat ${STAGE_DIR}/: no such
          # file or directory", the substituted yaml produces both packages.
          STAGE_DIR="${PACKAGE_NAME}"
          sed \
            -e "s|\${STAGE_DIR}|${STAGE_DIR}|g" \
            -e "s|\${VERSION}|${VERSION}|g" \
            packaging/nfpm.yaml > /tmp/nfpm.yaml

          /tmp/nfpm package --packager deb --config /tmp/nfpm.yaml --target "otf-browser_${VERSION}_amd64.deb"
          /tmp/nfpm package --packager rpm --config /tmp/nfpm.yaml --target "otf-browser-${VERSION}-1.x86_64.rpm"

          sha256sum "otf-browser_${VERSION}_amd64.deb" > "otf-browser_${VERSION}_amd64.deb.sha256"
          sha256sum "otf-browser-${VERSION}-1.x86_64.rpm" > "otf-browser-${VERSION}-1.x86_64.rpm.sha256"

          echo "DEB_PATH=otf-browser_${VERSION}_amd64.deb" >> $GITHUB_ENV
          echo "DEB_SHA256_PATH=otf-browser_${VERSION}_amd64.deb.sha256" >> $GITHUB_ENV
          echo "RPM_PATH=otf-browser-${VERSION}-1.x86_64.rpm" >> $GITHUB_ENV
          echo "RPM_SHA256_PATH=otf-browser-${VERSION}-1.x86_64.rpm.sha256" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.ASSET_SHA256_PATH }}
            ${{ env.APPIMAGE_PATH }}
            ${{ env.APPIMAGE_SHA256_PATH }}
            ${{ env.DEB_PATH }}
            ${{ env.DEB_SHA256_PATH }}
            ${{ env.RPM_PATH }}
            ${{ env.RPM_SHA256_PATH }}
          generate_release_notes: true
          draft: false
          # Auto-flag the GitHub Release as pre-release when the tag carries
          # a -alpha / -beta / -rc suffix. Lets the same workflow ship both
          # alpha and stable tags without manual intervention.
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows x64
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.12"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: x64

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      # Pin vcpkg to a tagged release instead of relying on the copy baked
      # into the windows-2025 image, whose ports tree can be months stale
      # (which is what caused "vips/libvips does not exist"). The ref here
      # must match builtin-baseline in vcpkg.json so ports and versions
      # resolve reproducibly.
      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: 2026.04.27
          path: vcpkg

      - name: Install vcpkg dependencies
        env:
          # x-gha caches the compiled binaries in the GitHub Actions cache so
          # the heavy libvips dependency tree only builds from source once.
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          .\vcpkg\bootstrap-vcpkg.bat
          # Use the static CRT triplet (/MT) to match CEF's runtime library.
          # CEF's cmake forces /MT via CEF_COMPILER_FLAGS_RELEASE; if vcpkg
          # builds SQLite3 with /MD (the x64-windows default), the resulting
          # CRT mismatch causes STATUS_ACCESS_VIOLATION in the renderer
          # process at runtime.
          .\vcpkg\vcpkg.exe install --triplet x64-windows-static

      - name: Download libvips
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/libvips/build-win64-mxe/releases/download/v8.17.2/vips-dev-w64-web-8.17.2.zip" `
            -OutFile "vips.zip"

          Expand-Archive vips.zip -DestinationPath C:\vips
          echo "VIPS_ROOT=C:\vips\vips-dev-8.17" >> $env:GITHUB_ENV
          echo "C:\vips\vips-dev-8.17\bin" >> $env:GITHUB_PATH

      - name: Cache CEF SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: third_party/cef
          key: cef-win64-${{ hashFiles('CEF_VERSION', 'CEF_SHA256_WIN64') }}

      - name: Install Dependencies (CEF)
        run: bash setup_deps.sh windows64

      - name: Build UI Assets
        run: bun run build:ui

      - name: Build C++ Engine
        env:
          OTF_VERSION: ${{ github.ref_name != '' && (startsWith(github.ref_name, 'v') && github.ref_name || '') || '' }}
        run: |
          Remove-Item Env:CC, Env:CXX -ErrorAction SilentlyContinue
          $version = "$env:OTF_VERSION"
          if ($version -and $version.StartsWith("v")) {
            $version = $version.Substring(1)
            Write-Host "Embedding OTF_VERSION=$version"
          }
          $env:OTF_VERSION = $version
          $toolchain_file = "$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake"
          mkdir build -Force
          cd build
          cmake -G Ninja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_TOOLCHAIN_FILE=$toolchain_file" "-DVCPKG_TARGET_TRIPLET=x64-windows-static" "-DCMAKE_C_COMPILER=cl.exe" "-DCMAKE_CXX_COMPILER=cl.exe" ..
          ninja otf-browser

      - name: Run C++ Tests
        run: |
          Remove-Item Env:CC, Env:CXX -ErrorAction SilentlyContinue
          cd build
          $toolchain_file = "$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake"
          cmake -G Ninja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_TOOLCHAIN_FILE=$toolchain_file" "-DVCPKG_TARGET_TRIPLET=x64-windows-static" "-DCMAKE_C_COMPILER=cl.exe" "-DCMAKE_CXX_COMPILER=cl.exe" ..
          ninja otf-tests
          ctest --output-on-failure -C Release

      - name: Run JS Tests
        run: bun run test:js

      - name: Package Release
        run: |
          $version = "$env:GITHUB_REF_NAME"
          $packageName = "otf-browser-windows-x64-$version"
          mkdir $packageName -Force
          Copy-Item "build/Release/*" "$packageName/" -Recurse
          Remove-Item "$packageName/otf-browser-native-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-extra-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-url-policy-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-json-bridge-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-tab-manager-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-store-tests.exe" -ErrorAction SilentlyContinue
          Remove-Item "$packageName/otf-browser-doc-preview-tests.exe" -ErrorAction SilentlyContinue
          New-Item "$packageName/diagnostics" -ItemType Directory -Force | Out-Null
          Copy-Item "scripts/collect-windows-crash-report.ps1" "$packageName/diagnostics/collect-windows-crash-report.ps1"
          Copy-Item LICENSE "$packageName/LICENSE"
          Copy-Item "third_party/cef/LICENSE.txt" "$packageName/LICENSE-cef.txt"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Resolve-Path $packageName), "$packageName.zip")
          $hash = (Get-FileHash "$packageName.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content "$packageName.zip.sha256" $hash
          Write-Host "PACKAGE_NAME=$packageName"
          echo "PACKAGE_NAME=$packageName" >> $env:GITHUB_ENV
          echo "ASSET_PATH=$packageName.zip" >> $env:GITHUB_ENV
          echo "ASSET_SHA256_PATH=$packageName.zip.sha256" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$packageName.zip" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.ASSET_SHA256_PATH }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

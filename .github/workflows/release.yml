name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++-14 \
            libsqlite3-dev \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm-dev \
            libgbm-dev \
            libasound2 \
            libpangocairo-1.0-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            libgtk-3-dev

      - name: Set CC/CXX to GCC 14
        run: |
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Install Dependencies (CEF)
        run: bun run setup

      - name: Build UI Assets
        run: bun run build:ui

      - name: Build C++ Engine
        run: bun run build:cpp

      - name: Run Tests
        run: bun run test

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF_NAME}
          PACKAGE_NAME="otf-browser-linux-x64-${VERSION}"
          mkdir -p ${PACKAGE_NAME}
          cp -r build/Release/* ${PACKAGE_NAME}/
          # Remove test binaries from release package
          rm -f ${PACKAGE_NAME}/otf-browser-native-tests
          tar -czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}
          echo "ASSET_PATH=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

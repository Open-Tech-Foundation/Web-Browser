name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Limit the GITHUB_TOKEN to the minimum needed by this workflow. Any future
# step that tries to do more (push to other refs, comment on PRs, etc.) will
# fail noisily instead of silently exfiltrating via the default scopes.
permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-24.04

    steps:
      # Third-party actions are pinned to commit SHAs (with the human-readable
      # tag in a comment) so a compromised upstream repo can't quietly swap
      # malicious code into the release build. Dependabot can keep these
      # current via `package-ecosystem: github-actions`.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7  # v1.2.2
        with:
          bun-version: "1.1.42"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++-14 \
            libsqlite3-dev \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm-dev \
            libgbm-dev \
            libasound2 \
            libpangocairo-1.0-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            libgtk-3-dev

      - name: Set CC/CXX to GCC 14
        run: |
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      # CEF is a ~400 MB download from Spotify's CDN. Cache it keyed on the
      # version file so subsequent runs at the same CEF_VERSION skip the
      # download (and the CDN dependency at release time). The cache key
      # bumps automatically whenever CEF_VERSION changes.
      - name: Cache CEF SDK
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: third_party/cef
          key: cef-linux64-${{ hashFiles('CEF_VERSION', 'CEF_SHA256') }}

      - name: Install Dependencies (CEF)
        run: bun run setup

      - name: Build UI Assets
        run: bun run build:ui

      - name: Build C++ Engine
        run: bun run build:cpp

      - name: Run Tests
        run: bun run test

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF_NAME}
          PACKAGE_NAME="otf-browser-linux-x64-${VERSION}"
          mkdir -p ${PACKAGE_NAME}
          cp -r build/Release/* ${PACKAGE_NAME}/
          # Remove test binaries from release package
          rm -f ${PACKAGE_NAME}/otf-browser-native-tests
          rm -f ${PACKAGE_NAME}/otf-browser-extra-tests
          # Strip the main binary (debug info isn't useful in a release
          # tarball and meaningfully shrinks the download).
          strip ${PACKAGE_NAME}/otf-browser || true
          # Bundle the project license and CEF's third-party license so the
          # tarball is self-contained for compliance / audit.
          cp LICENSE ${PACKAGE_NAME}/LICENSE
          cp third_party/cef/LICENSE.txt ${PACKAGE_NAME}/LICENSE-cef.txt
          # Tell the recipient how to make chrome-sandbox usable. The build's
          # SUID-helper note doesn't survive into the tarball, and without
          # this step the binary refuses to launch with a sandbox error.
          cat > ${PACKAGE_NAME}/INSTALL.txt <<'EOF'
          OTF Browser — installation notes
          ================================

          After extracting this tarball, give chrome-sandbox the SUID bit so
          the browser's sandbox can initialize:

              sudo chown root:root chrome-sandbox
              sudo chmod 4755 chrome-sandbox

          Then launch with:

              ./otf-browser

          If you skip the chmod step you can still run the browser with
          --no-sandbox, but doing so disables an important security layer
          and is not recommended for daily use.
          EOF
          # Smoke check: refuse to publish a tarball whose binary can't find
          # its shared libs. ldd output containing "not found" means the
          # rpath/copy step regressed and the binary won't launch at all.
          if ldd ${PACKAGE_NAME}/otf-browser | grep -q "not found"; then
            echo "Smoke check FAILED — missing shared libraries:" >&2
            ldd ${PACKAGE_NAME}/otf-browser | grep "not found" >&2
            exit 1
          fi
          tar -czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}
          # Publish a checksum alongside the tarball so downloaders can verify
          # the asset matches what this workflow built.
          sha256sum ${PACKAGE_NAME}.tar.gz > ${PACKAGE_NAME}.tar.gz.sha256
          echo "ASSET_PATH=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA256_PATH=${PACKAGE_NAME}.tar.gz.sha256" >> $GITHUB_ENV
          echo "ASSET_NAME=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.ASSET_SHA256_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

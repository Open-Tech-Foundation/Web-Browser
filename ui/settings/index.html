<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — OTF Browser</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --content-bg: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --accent: #f97316;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0 24px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.025em;
        }

        .nav-item {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            color: var(--text);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            color: var(--text);
            background-color: rgba(249, 115, 22, 0.1);
            border-right: 3px solid var(--accent);
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background-color: var(--content-bg);
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 1.875rem;
            margin: 0 0 8px;
            font-weight: 700;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
        }

        section {
            margin-bottom: 48px;
        }

        section h2 {
            font-size: 1.1rem;
            margin-bottom: 24px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        /* Search Engine Grid */
        .engine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .engine-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .engine-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            background-color: var(--card-hover);
        }

        .engine-card.selected {
            border-color: var(--accent);
            background-color: rgba(249, 115, 22, 0.05);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .engine-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
        }

        .engine-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .engine-info {
            flex-grow: 1;
        }

        .engine-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
        }

        /* Selection Badge */
        .check-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background-color: #22c55e;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);
            border: 2px solid var(--bg);
            z-index: 10;
        }

        .engine-card.selected .check-badge {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">OTF Settings</div>
        <div class="nav-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Search Engine
        </div>
        <div class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Appearance
        </div>
        <div class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Privacy & Security
        </div>
    </div>

    <div class="content">
        <header>
            <h1>Search Engine</h1>
            <p>Choose the search engine used in the address bar.</p>
        </header>

        <section>
            <h2>Default Search Engine</h2>
            <div class="engine-grid" id="engineGrid">
                <!-- Cards will be injected here -->
            </div>
        </section>
    </div>

    <script>
        const engines = [
            { id: 'google', name: 'Google', icon: '../assets/google.svg' },
            { id: 'bing', name: 'Microsoft Bing', icon: '../assets/bing.svg' },
            { id: 'yahoo', name: 'Yahoo', icon: '../assets/yahoo.svg' },
            { id: 'duckduckgo', name: 'DuckDuckGo', icon: '../assets/duckduckgo.svg' },
            { id: 'baidu', name: 'Baidu', icon: '../assets/baidu.svg' },
            { id: 'yandex', name: 'Yandex', icon: '../assets/yandex.svg' },
            { id: 'ecosia', name: 'Ecosia', icon: '../assets/ecosia.svg' },
            { id: 'naver', name: 'Naver', icon: '../assets/naver.svg' },
            { id: 'startpage', name: 'Startpage', icon: '../assets/startpage.svg' }
        ];

        let selectedEngine = '';

        function renderEngines() {
            const grid = document.getElementById('engineGrid');
            grid.innerHTML = engines.map(engine => `
                <div class="engine-card ${selectedEngine === engine.id ? 'selected' : ''}" onclick="selectEngine('${engine.id}')">
                    <div class="check-badge">✓</div>
                    <div class="engine-icon">
                        <img src="${engine.icon}" alt="${engine.name}">
                    </div>
                    <div class="engine-info">
                        <span class="engine-name">${engine.name}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectEngine(id) {
            selectedEngine = id;
            renderEngines();
            
            if (window.cefQuery) {
                window.cefQuery({
                    request: `set-settings:{"searchEngine":"${id}"}`,
                    onSuccess: () => console.log('Settings saved'),
                    onFailure: (code, msg) => alert('Failed to save settings: ' + msg)
                });
            }
        }

        // Load initial settings
        if (window.cefQuery) {
            window.cefQuery({
                request: 'get-settings',
                onSuccess: (response) => {
                    try {
                        const settings = JSON.parse(response);
                        selectedEngine = settings.searchEngine || '';
                        renderEngines();
                    } catch (e) {
                        console.error('Failed to parse settings:', e);
                        renderEngines();
                    }
                },
                onFailure: (code, msg) => {
                    console.error('Failed to load settings:', msg);
                    renderEngines();
                }
            });
        } else {
            renderEngines();
        }
    </script>
</body>
</html>

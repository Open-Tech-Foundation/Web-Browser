<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Intent E2E</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #111827 50%, #1f2937 100%);
      color: #e5e7eb;
    }
    main {
      display: grid;
      gap: 1rem;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      min-width: 320px;
      text-align: center;
    }
    button, a {
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      text-decoration: none;
    }
    button {
      color: #0f172a;
      background: #f8fafc;
    }
    a {
      color: #0f172a;
      background: #fca5a5;
      display: inline-block;
    }
  </style>
</head>
<body>
  <main>
    <h1>Popup Intent E2E</h1>
    <pre id="result">pending</pre>
    <pre id="auto-result">auto pending</pre>
    <button id="js-open" onclick="document.getElementById('result').textContent = (window.open('./popup-intent-target.html?mode=js', '_blank', 'popup=yes') ? 'opened' : 'blocked')">
      Open via window.open
    </button>
    <a id="plain-link" href="./popup-intent-target.html?mode=link">
      Open via link
    </a>
    <a id="blank-link" href="./popup-intent-target.html?mode=blank" target="_blank">
      Open with target blank
    </a>
    <a id="middle-link" href="./popup-intent-target.html?mode=middle">
      Open via middle click
    </a>
    <a id="ctrl-link" href="./popup-intent-target.html?mode=ctrl">
      Open via ctrl click
    </a>
  </main>
  <script>
    window.addEventListener('load', () => {
      const result = document.getElementById('auto-result');
      const opened = window.open('./popup-intent-target.html?mode=auto', '_blank', 'popup=yes');
      result.textContent = opened ? 'auto opened' : 'auto blocked';
    });
  </script>
</body>
</html>
